name: Update assets

on:
    workflow_dispatch:
    schedule:
        - cron: '2 0 * * *'
jobs:
    update:
        runs-on: self-hosted
        container: node:24-alpine
        steps:
            - uses: actions/checkout@v6
            - uses: actions/checkout@v6
              with:
                repository: "BANKA2017/twitter-monitor"
                path: twitter-monitor
            - name: Init
              run: |
                  apk --no-cache --update add git bash openssh-client
                  mkdir -p ~/.ssh
                  ssh-keyscan github.com >> ~/.ssh/known_hosts
                  mkdir -p tmpFiles
                  cp LICENSE readme.md -t tmpFiles/
                  cp -r .github tmpFiles/
                  cd twitter-monitor
                  corepack enable
                  yarn install
            - name: Rate limit checker
              env:
                TWITTER_REAL_OAUTH_TOKEN: ${{ secrets.TWITTER_REAL_OAUTH_TOKEN }}
                TWITTER_REAL_OAUTH_TOKEN_SECRET: ${{ secrets.TWITTER_REAL_OAUTH_TOKEN_SECRET }}
                TWITTER_COOKIE_AUTH_TOKEN: ${{ secrets.TWITTER_COOKIE_AUTH_TOKEN }}
                TWITTER_COOKIE_CT0: ${{ secrets.TWITTER_COOKIE_CT0 }}
              run: |
                mkdir -p "tmpFiles/rate_limit"
                cd twitter-monitor/apps/rate_limit_checker/
                node run.mjs
                cp data/readme.md data/rate_limit_status.json "../../../tmpFiles/rate_limit"
            - name: Graphql
              run: |
                mkdir -p "tmpFiles/graphql"
                node twitter-monitor/apps/scripts/updateQueryIdList.mjs
                cp twitter-monitor/libs/assets/graphql/featuresValueList.js twitter-monitor/libs/assets/graphql/graphqlQueryIdList.js twitter-monitor/libs/assets/graphql/featuresValueList.json twitter-monitor/libs/assets/graphql/graphqlQueryIdList.json "tmpFiles/graphql/"
            - name: Deploy
              env:
                  REPO: git@github.com:BANKA2017/twitter-monitor-assets.git
                  BRANCH: master
                  FOLDER: tmpFiles/
                  COMMIT_NAME: ${{ secrets.COMMIT_NAME }}
                  COMMIT_EMAIL: ${{ secrets.COMMIT_EMAIL }}
                  SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
              run: |
                  SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
                  MESSAGE="cron <- $SHORT_SHA"

                  echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
                  chmod 600 ~/.ssh/deploy_key
                  export GIT_SSH_COMMAND="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"

                  git clone --depth 1 -b "$BRANCH" "$REPO" /tmp/deploy_repo

                  rm -rf /tmp/deploy_repo/*
                  cp -r "$FOLDER"* /tmp/deploy_repo/

                  cd /tmp/deploy_repo
                  git config user.name "$COMMIT_NAME"
                  git config user.email "$COMMIT_EMAIL"

                  git add -A
                  if ! git diff --cached --quiet; then
                    git commit -m "$MESSAGE"
                    git push origin "$BRANCH"
                  fi
            - name: Clean
              run: rm -r tmpFiles twitter-monitor
